<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Collection Management System</title>
<style>
    body {
        font-family: Arial;
        background-color: #f5f5f5;
        padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #065A82; text-align: center; }
    .section { background: white; padding: 20px; margin: 20px 0; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #065A82; color: white; padding: 12px; }
    td { padding: 12px; border-bottom: 1px solid #ddd; }

    .add-movie {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;

    
}
   
</style>
</head>
<body>
<div class="container">
    <h1>Movie Collection Management System</h1>

    <div class="section">
        <input type="text" id="searchInput" placeholder="Search movies...">
    </div>

    <div class="section">
        <h2>Movies Collection</h2>
        <div id="movieList">Loading...</div>
    </div>
</div>

<div class="section add-movie">
  <h2>Add a New Movie</h2>
  <form id="addMovieForm">
    <input type="text" name="title" placeholder="Title" required>
    <input type="number" name="release_year" placeholder="Year" required>
    <input type="text" name="genre" placeholder="Genre" required>
    <input type="number" name="duration" placeholder="Duration (min)" required>
    <button type="submit">Add Movie</button>
  </form>
</div>

<script>
const API_URL = 'http://localhost:3000/api';
let allMovies = [];

// Load movies from backend
async function loadMovies() {
    try {
        const response = await fetch(`${API_URL}/movies`);
        allMovies = await response.json();
        displayMovies(allMovies);
    } catch (err) {
        document.getElementById('movieList').innerHTML = 'Error loading movies';
        console.error(err);
    }
}

async function deleteMovie(id) {
    await fetch(`${API_URL}/movies/${id}`, { method: 'DELETE' });
    allMovies = allMovies.filter(m => m.movie_id !== id);
    displayMovies(allMovies);
}

async function editMovie(id, currentTitle, currentYear, currentGenre, currentDuration) {
  const newTitle = prompt('Enter new title:', currentTitle);
  if (!newTitle) return;

  const newYear = prompt('Enter new release year:', currentYear);
  if (!newYear) return;

  const newGenre = prompt('Enter genre:', currentGenre);
  if (!newGenre) return;

  const newDuration = prompt('Enter duration (min):', currentDuration);
  if (!newDuration) return;

  try {
    const response = await fetch(`http://localhost:3000/api/movies/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: newTitle,
        release_year: parseInt(newYear),
        genre: newGenre,
        duration: parseInt(newDuration)
      })
    });

    if (response.ok) {
      const updatedMovie = await response.json();

      // Update the movie in allMovies array
      allMovies = allMovies.map(m => (m.movie_id === id ? updatedMovie : m));
      displayMovies(allMovies);

      alert('Movie updated successfully!');
    } else {
      alert('Error updating movie');
    }
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

function displayMovies(movies) {
    const container = document.getElementById('movieList');
    container.innerHTML = '';

    if (movies.length === 0) {
        container.textContent = 'No movies found.';
        return;
    }

    const table = document.createElement('table');
    const headerRow = document.createElement('tr');
    ['Title', 'Year', 'Genre', 'Duration (min)', 'Actions'].forEach(text => {
        const th = document.createElement('th');
        th.textContent = text;
        headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    // Table rows
    movies.forEach(movie => {
        const row = document.createElement('tr');

        // Movie data cells
        ['title', 'release_year', 'genre', 'duration'].forEach(field => {
            const td = document.createElement('td');
            td.textContent = movie[field];
            row.appendChild(td);
        });

        // Delete button cell
        const actionTd = document.createElement('td');

        // Edit button
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', () =>
        editMovie(movie.movie_id, movie.title, movie.release_year, movie.genre, movie.duration)
        );
        actionTd.appendChild(editBtn);

        // Delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteMovie(movie.movie_id));
        actionTd.appendChild(deleteBtn);

        row.appendChild(actionTd);

        table.appendChild(row);
    });

    container.appendChild(table);
}

// Search functionality
document.getElementById('searchInput').addEventListener('input', (e) => {
    const search = e.target.value.toLowerCase();
    const filtered = allMovies.filter(m => m.title.toLowerCase().includes(search));
    displayMovies(filtered);
});

// Handle Add Movie form submission
document.getElementById('addMovieForm').addEventListener('submit', async (e) => {
    e.preventDefault(); // prevent page refresh

    const form = e.target;
    const newMovie = {
        title: form.title.value,
        release_year: parseInt(form.release_year.value),
        genre: form.genre.value,
        duration: parseInt(form.duration.value)
    };

    try {
        const res = await fetch('http://localhost:3000/api/movies', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newMovie)
        });

        if (!res.ok) {
            throw new Error('Failed to add movie');
        }

        const addedMovie = await res.json();

        // Add the new movie to the displayed table
        allMovies.push(addedMovie);
        displayMovies(allMovies);

        // Clear the form
        form.reset();

    } catch (err) {
        console.error(err);
        alert('Error adding movie: ' + err.message);
    }
});

// Load movies when page loads
window.addEventListener('DOMContentLoaded', loadMovies);
</script>
</body>
</html>
